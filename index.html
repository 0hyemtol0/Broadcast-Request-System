<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>영파여자중학교 방송요청 시스템</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Calendar, Clock, Video, Mic, Users, MapPin, FileText, 
      Send, Bell, Settings, LogOut, Trash2, 
      CheckCircle, AlertCircle, X, Shield, Key
    } from 'lucide-react';
    import { initializeApp } from 'firebase/app';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
    import { getFirestore, collection, doc, setDoc, onSnapshot, addDoc, updateDoc, deleteDoc, serverTimestamp } from 'firebase/firestore';

    // ==========================================
    // 🌟 Firebase 설정 🌟
    // 선생님의 파이어베이스 정보로 유지해주세요!
    // ==========================================
    let firebaseConfig = {
        apiKey: "AIzaSyApw-eOLuyrGb3mwIITzM1WlgAGKDV7_ZQ",
        authDomain: "yp-broadcast.firebaseapp.com",
        projectId: "yp-broadcast",
        storageBucket: "yp-broadcast.firebasestorage.app",
        messagingSenderId: "214272381910",
        appId: "1:214272381910:web:701dfae6067f5e45f90a77"
    };

    if (typeof __firebase_config !== 'undefined') firebaseConfig = JSON.parse(__firebase_config);

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'youngpa-broadcast-system';

    // ==========================================
    // 메인 어플리케이션 컴포넌트
    // ==========================================
    function App() {
      const [user, setUser] = useState(null);
      const [authInitialized, setAuthInitialized] = useState(false);
      const [view, setView] = useState('form'); 
      const [requests, setRequests] = useState([]);
      const [isAdmin, setIsAdmin] = useState(false);
      const [adminPassword, setAdminPassword] = useState('admin'); 
      const [toasts, setToasts] = useState([]);
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [showLoginModal, setShowLoginModal] = useState(false);
      const [loginIdInput, setLoginIdInput] = useState('');
      const [loginPwInput, setLoginPwInput] = useState('');

      useEffect(() => {
        let isMounted = true;
        signInAnonymously(auth).catch(console.error);
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (isMounted) { setUser(currentUser); setAuthInitialized(true); }
        });
        return () => { isMounted = false; unsubscribe(); };
      }, []);

      useEffect(() => {
        if (!user) return;
        const reqRef = collection(db, 'artifacts', appId, 'public', 'data', 'requests');
        const unsubReq = onSnapshot(reqRef, (snapshot) => {
          setRequests(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        });

        const authConfigRef = collection(db, 'artifacts', appId, 'public', 'data', 'settings');
        const unsubAuth = onSnapshot(authConfigRef, (snapshot) => {
          const authDoc = snapshot.docs.find(d => d.id === 'adminAuth');
          setAdminPassword(authDoc ? authDoc.data().password : 'admin');
        });

        const myProfileRef = collection(db, 'artifacts', appId, 'users', user.uid, 'profile');
        const unsubProfile = onSnapshot(myProfileRef, (snapshot) => {
          const infoDoc = snapshot.docs.find(d => d.id === 'info');
          setIsAdmin(infoDoc ? infoDoc.data().isAdmin : false);
        });

        return () => { unsubReq(); unsubAuth(); unsubProfile(); };
      }, [user, isAdmin]); 

      const addToast = (message, type = 'info') => {
        const id = Date.now().toString() + Math.random().toString();
        setToasts(prev => [...prev, { id, message, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
      };

      const handleLoginClick = () => { setLoginIdInput(''); setLoginPwInput(''); setShowLoginModal(true); setIsMenuOpen(false); };

      const executeLogin = async (e) => {
        e.preventDefault();
        if (loginIdInput === 'admin' && loginPwInput === adminPassword) {
          try {
            await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info'), { isAdmin: true });
            setShowLoginModal(false); addToast("관리자 로그인 성공", "success"); setView('dashboard');
          } catch (error) { addToast("로그인 오류", "error"); }
        } else { addToast("아이디/비밀번호 불일치", "error"); }
      };

      const handleLogout = async () => {
        await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'info'), { isAdmin: false });
        setView('form'); addToast("로그아웃 되었습니다.", "info");
      };

      if (!authInitialized) return <div className="min-h-screen flex items-center justify-center bg-gray-50"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-green-700"></div></div>;

      return (
        <div className="min-h-screen bg-gray-50 font-sans text-gray-800">
          <nav className="bg-white shadow-sm sticky top-0 z-40">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-16">
                <div className="flex items-center cursor-pointer" onClick={() => setView('form')}>
                  <Mic className="h-8 w-8 text-green-700 mr-2" />
                  <span className="font-bold text-xl text-gray-900 tracking-tight">영파여자중학교 방송요청</span>
                </div>
                
                <div className="hidden sm:flex sm:items-center sm:space-x-4">
                  <button onClick={() => setView('form')} className={`px-3 py-2 rounded-md text-sm font-medium ${view === 'form' ? 'bg-green-50 text-green-800' : 'text-gray-600 hover:bg-gray-100'}`}>신청하기</button>
                  {isAdmin && (
                    <>
                      <button onClick={() => setView('dashboard')} className={`px-3 py-2 rounded-md text-sm font-medium ${view === 'dashboard' ? 'bg-green-50 text-green-800' : 'text-gray-600 hover:bg-gray-100'}`}>관리자 대시보드</button>
                      <button onClick={() => setView('settings')} className={`px-3 py-2 rounded-md text-sm font-medium ${view === 'settings' ? 'bg-green-50 text-green-800' : 'text-gray-600 hover:bg-gray-100'}`}>설정</button>
                    </>
                  )}
                  {isAdmin ? (
                    <div className="flex items-center ml-4 border-l pl-4 border-gray-200">
                      <span className="text-sm font-semibold text-green-700 bg-green-50 px-3 py-1 rounded-full mr-4">관리자 접속중</span>
                      <button onClick={handleLogout} className="text-gray-500 hover:text-red-600 transition-colors flex items-center"><LogOut className="h-5 w-5 mr-1" /> <span className="text-sm font-medium">로그아웃</span></button>
                    </div>
                  ) : (
                    <button onClick={handleLoginClick} className="ml-4 inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-gray-800 hover:bg-gray-900 focus:outline-none"><Key className="w-4 h-4 mr-2" /> 관리자 로그인</button>
                  )}
                </div>
              </div>
            </div>
          </nav>

          <main className="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {view === 'form' && <RequestForm addToast={addToast} appId={appId} db={db} user={user} />}
            {view === 'dashboard' && isAdmin && <AdminDashboard requests={requests} db={db} appId={appId} addToast={addToast} />}
            {view === 'settings' && isAdmin && <AdminSettings db={db} appId={appId} addToast={addToast} currentPassword={adminPassword} />}
            {view !== 'form' && !isAdmin && (
              <div className="text-center py-20"><Shield className="mx-auto h-16 w-16 text-red-400 mb-4" /><h2 className="text-2xl font-bold text-gray-800">접근 권한이 없습니다</h2></div>
            )}
          </main>

          {showLoginModal && (
            <div className="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50 px-4">
              <div className="bg-white p-8 rounded-xl shadow-xl w-full max-w-sm">
                <div className="text-center mb-6"><h3 className="text-xl font-bold text-gray-900">관리자 로그인</h3></div>
                <form onSubmit={executeLogin}>
                  <div className="mb-4"><input type="text" value={loginIdInput} onChange={e => setLoginIdInput(e.target.value)} placeholder="아이디 (admin)" className="w-full rounded-md border-gray-300 p-2.5 border" required /></div>
                  <div className="mb-6"><input type="password" value={loginPwInput} onChange={e => setLoginPwInput(e.target.value)} placeholder="비밀번호" className="w-full rounded-md border-gray-300 p-2.5 border" required /></div>
                  <div className="flex justify-end space-x-3">
                    <button type="button" onClick={() => setShowLoginModal(false)} className="px-4 py-2 bg-gray-100 rounded-md w-full">취소</button>
                    <button type="submit" className="px-4 py-2 bg-green-700 text-white rounded-md w-full">로그인</button>
                  </div>
                </form>
              </div>
            </div>
          )}
          <div className="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none">
            {toasts.map(toast => (
              <div key={toast.id} className={`flex items-center p-4 rounded-lg shadow-lg text-white pointer-events-auto ${toast.type === 'success' ? 'bg-green-600' : toast.type === 'error' ? 'bg-red-600' : 'bg-gray-800'}`}>
                {toast.message}
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ==========================================
    // Request Form Component
    // ==========================================
    function RequestForm({ addToast, appId, db, user }) {
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [formData, setFormData] = useState({
        broadcastDate: '', startTime: '', endTime: '', content: '', department: '교무기획부', customDepartment: '',
        requester: '', audience: '', location: '', broadcastType: '동영상 시청', customBroadcastType: '',
        equipment: [], scriptType: '필요없음', customScript: '', materialLink: '', fileDescription: '', remarks: ''
      });

      const departmentOptions = ['교무기획부', '미래교육연구부', '생활안전부', '진로진학교육부', '학생통합지원부', '기타'];
      const equipmentOptions = ['마이크', '컴퓨터 (PC)', '학생의자', '빔프로젝터', '스피커', '기타'];
      const broadcastTypes = ['동영상 시청', '강사 강의', '천장스피커만 사용', '행사 생중계(방송실에서 카메라 사용)', '기타'];

      const handleChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
      const handleEquipmentChange = (eq) => setFormData(prev => ({ ...prev, equipment: prev.equipment.includes(eq) ? prev.equipment.filter(i => i !== eq) : [...prev.equipment, eq] }));

      const handleSubmit = async (e) => {
        e.preventDefault();
        setIsSubmitting(true);
        try {
          const submitData = {
            ...formData,
            department: formData.department === '기타' ? formData.customDepartment : formData.department,
            broadcastType: formData.broadcastType === '기타' ? formData.customBroadcastType : formData.broadcastType,
            status: '대기중', createdAt: serverTimestamp(), submitterId: user.uid
          };
          delete submitData.customDepartment; delete submitData.customBroadcastType;

          // 1. 파이어베이스에 요청서 저장
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'requests'), submitData);
          
          // ==============================================================
          // 🌟 [2단계] EmailJS 알림 메일 발송 🌟
          // 가입 후 발급받은 3가지 정보를 아래 따옴표 안에 넣어주세요!
          // ==============================================================
          const EMAILJS_SERVICE_ID = "service_p2n8n7d"; 
          const EMAILJS_TEMPLATE_ID = "template_eh0fcth"; 
          const EMAILJS_PUBLIC_KEY = "XEI6VfPg_XkMB1uij";   

          if(EMAILJS_SERVICE_ID !== "service_p2n8n7d") {
            try {
              await fetch('https://api.emailjs.com/api/v1.0/email/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  service_id: EMAILJS_SERVICE_ID,
                  template_id: EMAILJS_TEMPLATE_ID,
                  user_id: EMAILJS_PUBLIC_KEY,
                  template_params: {
                    to_email: 'uliya@youngpa.sen.ms.kr', // 선생님께서 요청하신 고정 메일 주소
                    department: submitData.department, // 의뢰부서
                    requester: submitData.requester,   // 담당자
                    broadcastDate: submitData.broadcastDate // 방송일
                  }
                })
              });
            } catch (err) {
              console.error("이메일 발송 실패", err);
            }
          }

          addToast("방송 협조 요청이 성공적으로 접수되었습니다.", "success");
          setFormData({ broadcastDate: '', startTime: '', endTime: '', content: '', department: '교무기획부', customDepartment: '', requester: '', audience: '', location: '', broadcastType: '동영상 시청', customBroadcastType: '', equipment: [], scriptType: '필요없음', customScript: '', materialLink: '', fileDescription: '', remarks: '' });
        } catch (error) { addToast("제출 중 오류가 발생했습니다.", "error"); } 
        finally { setIsSubmitting(false); }
      };

      return (
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden max-w-4xl mx-auto">
          <div className="bg-green-700 px-6 py-8 text-white text-center"><h1 className="text-3xl font-bold mb-2">방송 협조 요청서</h1></div>
          <form onSubmit={handleSubmit} className="p-6 sm:p-10 space-y-8">
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div><label className="block text-sm font-medium mb-1">방송일 *</label><input type="date" name="broadcastDate" value={formData.broadcastDate} onChange={handleChange} required className="w-full rounded-md border-gray-300 p-2 border" /></div>
              <div><label className="block text-sm font-medium mb-1">시작 시간 *</label><input type="time" name="startTime" value={formData.startTime} onChange={handleChange} required className="w-full rounded-md border-gray-300 p-2 border" /></div>
              <div><label className="block text-sm font-medium mb-1">종료 시간 *</label><input type="time" name="endTime" value={formData.endTime} onChange={handleChange} required className="w-full rounded-md border-gray-300 p-2 border" /></div>
              <div className="md:col-span-3"><label className="block text-sm font-medium mb-1">방송 내용 *</label><textarea name="content" value={formData.content} onChange={handleChange} required rows={2} className="w-full rounded-md border-gray-300 p-2 border"></textarea></div>
              <div>
                <label className="block text-sm font-medium mb-1">의뢰 부서</label>
                <select name="department" value={formData.department} onChange={handleChange} className="w-full rounded-md border-gray-300 p-2 border bg-white">{departmentOptions.map(d => <option key={d}>{d}</option>)}</select>
                {formData.department === '기타' && <input type="text" name="customDepartment" value={formData.customDepartment} onChange={handleChange} placeholder="직접 입력" className="mt-2 w-full rounded-md border-gray-300 p-2 border" />}
              </div>
              <div><label className="block text-sm font-medium mb-1">담당자 *</label><input type="text" name="requester" value={formData.requester} onChange={handleChange} required className="w-full rounded-md border-gray-300 p-2 border" /></div>
              <div><label className="block text-sm font-medium mb-1">연락처</label><input type="text" name="contact" onChange={handleChange} className="w-full rounded-md border-gray-300 p-2 border" /></div>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div><label className="block text-sm font-medium mb-1">방송 대상</label><input type="text" name="audience" value={formData.audience} onChange={handleChange} className="w-full rounded-md border-gray-300 p-2 border" /></div>
              <div><label className="block text-sm font-medium mb-1">장소</label><input type="text" name="location" value={formData.location} onChange={handleChange} className="w-full rounded-md border-gray-300 p-2 border" /></div>
              <div>
                <label className="block text-sm font-medium mb-1">방송 형태</label>
                <select name="broadcastType" value={formData.broadcastType} onChange={handleChange} className="w-full rounded-md border-gray-300 p-2 border bg-white">{broadcastTypes.map(t => <option key={t}>{t}</option>)}</select>
                {formData.broadcastType === '기타' && <input type="text" name="customBroadcastType" value={formData.customBroadcastType} onChange={handleChange} placeholder="직접 입력" className="mt-2 w-full rounded-md border-gray-300 p-2 border" />}
              </div>
              <div>
                <label className="block text-sm font-medium mb-2">필요 준비물</label>
                <div className="flex flex-wrap gap-3">{equipmentOptions.map(eq => <label key={eq} className="inline-flex items-center"><input type="checkbox" checked={formData.equipment.includes(eq)} onChange={() => handleEquipmentChange(eq)} className="rounded border-gray-300 text-green-700 h-4 w-4"/><span className="ml-2 text-sm">{eq}</span></label>)}</div>
              </div>
            </div>
            <div className="space-y-6">
              <div>
                <label className="block text-sm font-medium mb-2">아나운서 멘트</label>
                <div className="flex gap-4 mb-3">{['필요없음', '기본양식', '직접작성'].map(t => <label key={t} className="inline-flex items-center"><input type="radio" name="scriptType" value={t} checked={formData.scriptType === t} onChange={handleChange} className="text-green-700 h-4 w-4"/><span className="ml-2 text-sm">{t}</span></label>)}</div>
                {formData.scriptType === '직접작성' && <textarea name="customScript" value={formData.customScript} onChange={handleChange} rows={2} className="w-full rounded-md border-gray-300 p-2 border mt-2"></textarea>}
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div><label className="block text-sm font-medium mb-1">방송 자료 링크</label><input type="url" name="materialLink" value={formData.materialLink} onChange={handleChange} className="w-full rounded-md border-gray-300 p-2 border" /></div>
                <div><label className="block text-sm font-medium mb-1">기타 자료/파일 설명</label><input type="text" name="fileDescription" value={formData.fileDescription} onChange={handleChange} className="w-full rounded-md border-gray-300 p-2 border" /></div>
              </div>
              <div><label className="block text-sm font-medium mb-1">비고 (기타 요청사항)</label><textarea name="remarks" value={formData.remarks} onChange={handleChange} rows={2} className="w-full rounded-md border-gray-300 p-2 border"></textarea></div>
            </div>
            <div className="pt-4 flex justify-end"><button type="submit" disabled={isSubmitting} className="px-8 py-3 bg-green-700 text-white rounded-md">{isSubmitting ? '전송 중...' : '방송 요청서 제출'}</button></div>
          </form>
        </div>
      );
    }

    // ==========================================
    // Admin Dashboard Component
    // ==========================================
    function AdminDashboard({ requests, db, appId, addToast }) {
      const [filter, setFilter] = useState('all'); 
      const [expandedId, setExpandedId] = useState(null);

      const sortedRequests = useMemo(() => requests.filter(r => filter === 'all' ? true : r.status === filter).sort((a, b) => new Date(`${a.broadcastDate}T${a.startTime}`) - new Date(`${b.broadcastDate}T${b.startTime}`)), [requests, filter]);

      const updateStatus = async (id, newStatus) => {
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'requests', id), { status: newStatus });
        addToast(`상태가 변경되었습니다.`, "success");
      };

      const deleteRequest = async (id) => {
        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'requests', id));
        addToast("요청이 삭제되었습니다.", "success");
      };

      return (
        <div className="space-y-6 max-w-6xl mx-auto">
          <div className="flex justify-between items-center bg-white p-6 rounded-xl border border-gray-100">
            <h2 className="text-2xl font-bold flex items-center"><Video className="w-6 h-6 mr-2 text-green-700" /> 방송 요청 관리</h2>
            <div className="flex space-x-2">{['all', '대기중', '승인됨', '완료'].map(f => <button key={f} onClick={() => setFilter(f)} className={`px-3 py-1.5 rounded-md text-sm ${filter === f ? 'bg-green-700 text-white' : 'bg-gray-100'}`}>{f === 'all' ? '전체' : f}</button>)}</div>
          </div>
          <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <ul className="divide-y divide-gray-200">
              {sortedRequests.map(req => (
                <li key={req.id} className="hover:bg-gray-50">
                  <div className="px-6 py-5 cursor-pointer flex justify-between items-center" onClick={() => setExpandedId(expandedId === req.id ? null : req.id)}>
                    <div>
                      <div className="flex items-center space-x-3 mb-1">
                        <span className="px-2.5 py-0.5 rounded-full text-xs border bg-gray-100">{req.status}</span>
                        <span className="text-sm text-gray-500">{req.broadcastDate}</span>
                      </div>
                      <h3 className="text-lg font-bold">{req.content}</h3>
                      <div className="text-sm text-gray-600 mt-1 flex space-x-4"><span>{req.department} {req.requester}</span><span>{req.broadcastType}</span></div>
                    </div>
                    <div className="flex space-x-2" onClick={e => e.stopPropagation()}>
                        {req.status === '대기중' && <button onClick={() => updateStatus(req.id, '승인됨')} className="px-3 py-1 bg-teal-50 text-teal-700 rounded text-sm">승인</button>}
                        {req.status === '승인됨' && <><button onClick={() => updateStatus(req.id, '대기중')} className="px-3 py-1 bg-gray-100 rounded text-sm">승인 취소</button><button onClick={() => updateStatus(req.id, '완료')} className="px-3 py-1 bg-emerald-50 text-emerald-700 rounded text-sm">완료처리</button></>}
                        {req.status === '완료' && <button onClick={() => updateStatus(req.id, '승인됨')} className="px-3 py-1 bg-gray-100 rounded text-sm">완료 취소</button>}
                    </div>
                  </div>
                  {expandedId === req.id && (
                     <div className="px-6 py-5 bg-green-50/50 border-t border-gray-100">
                        <p className="text-sm bg-white p-3 rounded mb-2"><b>장소:</b> {req.location} | <b>시간:</b> {req.startTime}~{req.endTime}</p>
                        <p className="text-sm bg-white p-3 rounded mb-2"><b>준비물:</b> {req.equipment?.join(', ')}</p>
                        <p className="text-sm bg-white p-3 rounded mb-2"><b>멘트 ({req.scriptType}):</b> {req.customScript}</p>
                        <p className="text-sm bg-white p-3 rounded mb-2"><b>비고:</b> {req.remarks}</p>
                        <div className="flex justify-end pt-2"><button onClick={() => deleteRequest(req.id)} className="px-3 py-1 bg-red-50 text-red-600 rounded text-sm">삭제</button></div>
                     </div>
                  )}
                </li>
              ))}
            </ul>
          </div>
        </div>
      );
    }

    // ==========================================
    // Admin Settings Component (이메일 등록 폼 제거됨)
    // ==========================================
    function AdminSettings({ db, appId, addToast, currentPassword }) {
      const [newPw, setNewPw] = useState('');

      const handleChangePassword = async (e) => {
        e.preventDefault();
        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'adminAuth'), { password: newPw });
        addToast("비밀번호가 변경되었습니다.", "success"); setNewPw('');
      };

      return (
        <div className="max-w-2xl mx-auto space-y-6">
          <div className="bg-white p-6 rounded-xl border border-gray-200">
            <h3 className="text-lg font-bold mb-4 flex items-center"><Key className="w-5 h-5 mr-2 text-green-600"/> 비밀번호 변경</h3>
            <form onSubmit={handleChangePassword} className="flex gap-2">
              <input type="password" value={newPw} onChange={e => setNewPw(e.target.value)} placeholder="새 비밀번호" className="flex-1 border p-2 rounded" required />
              <button type="submit" className="bg-green-700 text-white px-4 py-2 rounded">변경</button>
            </form>
          </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
